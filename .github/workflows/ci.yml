---
name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: org-runner
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - run: go vet ./...
      - run: go test ./...

  build-image:
    needs: test
    runs-on: org-runner
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    env:
      REGISTRY: ${{ secrets.HARBOR_URL }}
      IMAGE_PREFIX: ${{ secrets.HARBOR_URL }}/operinko-labs
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Buildah/Podman
        run: |
          echo "BUILDAH_ISOLATION=chroot" >> $GITHUB_ENV
          sudo apt-get update
          sudo apt-get -y install buildah podman uidmap libcap2 libcap2-bin
          sudo setcap cap_setuid+eip /usr/bin/newuidmap
          sudo setcap cap_setgid+eip /usr/bin/newgidmap
          sudo chmod u-s /usr/bin/newuidmap
          sudo chmod u-s /usr/bin/newgidmap
          mkdir -p "$HOME/.docker"
          echo -e "[storage]\ndriver = \"vfs\"" | sudo tee /etc/containers/storage.conf > /dev/null

      - name: Log in to Harbor
        uses: redhat-actions/podman-login@4934294ad0449894bcd1e9f191899d7292469603 # v1.7
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build image
        id: build
        uses: redhat-actions/buildah-build@7a95fa7ee0f02d552a32753e7414641a04307056 # v2.13
        with:
          image: ${{ env.IMAGE_PREFIX }}/stalwart-users
          tags: ${{ steps.tag.outputs.tag }}
          containerfiles: Dockerfile
          context: .
          layers: true

      - name: Push image
        uses: redhat-actions/push-to-registry@5ed88d269cf581ea9ef6dd6806d01562096bee9c # v2.8
        with:
          image: ${{ steps.build.outputs.image }}
          tags: ${{ steps.build.outputs.tags }}
