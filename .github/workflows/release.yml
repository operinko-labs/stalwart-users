---
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Create SPA zip
        run: cd ui && zip -r ../stalwart-users-ui.zip .

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: stalwart-users-ui.zip
          generate_release_notes: true

      - name: Set image tag
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: docker build -t harbor.vaderrp.com/operinko-labs/stalwart-users:${{ steps.tag.outputs.tag }} .

      - name: Push Docker image
        run: docker push harbor.vaderrp.com/operinko-labs/stalwart-users:${{ steps.tag.outputs.tag }}
